<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Address - FyroScan</title>
  <link rel="icon" href="https://fyroscan.org/logo192.png">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <div class="page-wrapper">
    <div id="navbar"></div>

    <!-- Page Hero with address -->
    <section class="page-hero">
      <div class="page-hero-inner">
        <div class="page-hero-label">FyroChain Explorer</div>
        <div class="page-hero-title">
          <span>Address</span>
          <span class="page-hero-addr" id="addrHeroDisplay"></span>
        </div>
      </div>
    </section>

    <main class="main">

      <!-- Breadcrumb -->
      <div style="margin-bottom:16px;font-size:13px;color:#94a3b8;">
        <a href="index.html" style="color:#2563eb;">Home</a>
        <span style="margin:0 6px;">›</span>
        <span>Address</span>
        <span style="margin:0 6px;">›</span>
        <span id="breadcrumbAddr" class="mono" style="font-size:12px;"></span>
      </div>

      <!-- Address card with copy -->
      <div class="detail-card" style="margin-bottom:20px;">
        <div class="detail-card-header">
          🏦 Address
          <span id="addrDisplayFull" class="mono"
            style="font-size:12.5px;color:#2563eb;font-weight:400;margin-left:8px;word-break:break-all;"></span>
          <button class="copy-btn" id="copyAddrBtn" style="margin-left:8px;">📋 Copy</button>
        </div>
      </div>

      <!-- Stats grid -->
      <div class="addr-stats-grid" style="margin-bottom:20px;">
        <div class="addr-stat-card">
          <div class="addr-stat-label">FYRO Balance</div>
          <div class="addr-stat-value" id="addrBalance">—</div>
          <div class="addr-stat-sub">($0.00 USD)</div>
        </div>
        <div class="addr-stat-card">
          <div class="addr-stat-label">Total Transactions</div>
          <div class="addr-stat-value dark" id="addrTxCount">—</div>
          <div class="addr-stat-sub">All time</div>
        </div>
        <div class="addr-stat-card">
          <div class="addr-stat-label">First Seen</div>
          <div class="addr-stat-value dark" id="addrFirstSeen" style="font-size:16px;">—</div>
          <div class="addr-stat-sub">Block activity</div>
        </div>
      </div>

      <!-- Transaction history -->
      <div class="table-card">
        <div class="table-card-header">
          <span class="table-card-title">Transactions</span>
          <span class="table-card-meta" id="addrTxTotal"></span>
        </div>
        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr>
                <th>Txn Hash</th>
                <th>Block</th>
                <th>Age</th>
                <th>Direction</th>
                <th>From</th>
                <th></th>
                <th>To</th>
                <th>Value</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="addrTxsBody">
              <tr>
                <td colspan="9">
                  <div class="empty-state">
                    <div class="empty-state-icon">⏳</div>
                    <p>Loading...</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div id="addrPagination" class="pagination" style="display:none;"></div>
      </div>

    </main>

    <div id="footer"></div>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    initPage('');

    const ADDR = getParam('addr');

    function setAddrDisplay() {
      if (!ADDR) return;
      document.getElementById('addrHeroDisplay').textContent = ADDR;
      document.getElementById('addrDisplayFull').textContent = ADDR;
      document.getElementById('breadcrumbAddr').textContent = truncateHash(ADDR, 12, 8);
      document.title = `${truncateHash(ADDR)} - FyroScan`;
      document.getElementById('copyAddrBtn').onclick = () => copyToClipboard(ADDR, document.getElementById('copyAddrBtn'));
    }

    async function loadAddress(page = 1) {
      if (!ADDR) {
        document.getElementById('addrTxsBody').innerHTML = `<tr><td colspan="9"><div class="empty-state"><p>No address provided.</p></div></td></tr>`;
        return;
      }
      setAddrDisplay();

      const data = await apiFetch(`/address/${ADDR}?page=${page}`);
      if (!data) {
        document.getElementById('addrTxsBody').innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="empty-state-icon">🔍</div><p>Address not found or no activity.</p></div></td></tr>`;
        return;
      }

      document.getElementById('addrBalance').textContent = formatFyro(data.balance, 6);
      document.getElementById('addrTxCount').textContent = formatNumber(data.total || 0);
      document.getElementById('addrFirstSeen').textContent = data.firstSeen ? timeAgo(data.firstSeen) : 'N/A';
      document.getElementById('addrTxTotal').textContent = `${formatNumber(data.total || 0)} transactions`;

      if (data.transactions && data.transactions.length > 0) {
        document.getElementById('addrTxsBody').innerHTML = data.transactions.map(tx => {
          const isOut = tx.from_addr?.toLowerCase() === ADDR.toLowerCase();
          const dir = isOut
            ? `<span class="badge-out">OUT</span>`
            : `<span class="badge-in">IN</span>`;
          return `
          <tr>
            <td><a href="tx.html?hash=${tx.hash}" class="hash-link">${truncateHash(tx.hash, 12, 6)}</a></td>
            <td><a href="block.html?n=${tx.block_number}" class="block-link">${formatNumber(tx.block_number)}</a></td>
            <td class="time-ago">${timeAgo(tx.timestamp)}</td>
            <td>${dir}</td>
            <td><a href="address.html?addr=${tx.from_addr}" class="addr-link">${truncateHash(tx.from_addr, 8, 6)}</a></td>
            <td><span style="font-size:11px;color:#94a3b8;">→</span></td>
            <td>${tx.to_addr ? `<a href="address.html?addr=${tx.to_addr}" class="addr-link">${truncateHash(tx.to_addr, 8, 6)}</a>` : '<em class="text-muted">Contract</em>'}</td>
            <td style="font-size:12.5px;font-weight:600;color:#2563eb;">${formatFyro(tx.value, 4)}</td>
            <td>${statusBadge(tx.status)}</td>
          </tr>
        `;
        }).join('');
      } else {
        document.getElementById('addrTxsBody').innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="empty-state-icon">📋</div><p>No transactions found.</p></div></td></tr>`;
      }

      if (data.totalPages > 1) {
        const pagination = document.getElementById('addrPagination');
        pagination.style.display = 'flex';
        let html = `<button class="page-btn" onclick="loadAddress(${page - 1})" ${page <= 1 ? 'disabled' : ''}>← Prev</button>`;
        for (let i = Math.max(1, page - 2); i <= Math.min(data.totalPages, page + 2); i++) {
          html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadAddress(${i})">${i}</button>`;
        }
        html += `<button class="page-btn" onclick="loadAddress(${page + 1})" ${page >= data.totalPages ? 'disabled' : ''}>Next →</button>`;
        pagination.innerHTML = html;
      }
    }

    setAddrDisplay();
    loadAddress(1);
  </script>
</body>

</html>
