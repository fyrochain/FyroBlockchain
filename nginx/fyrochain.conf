# FyroChain Nginx Configuration
# Place at: /etc/nginx/sites-available/fyrochain
# Symlink: ln -s /etc/nginx/sites-available/fyrochain /etc/nginx/sites-enabled/

# Rate limiting zone for RPC
limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

# ─── fyroscan.org - Block Explorer ──────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name fyroscan.org www.fyroscan.org;

    # Redirect www to non-www
    if ($host = www.fyroscan.org) {
        return 301 https://fyroscan.org$request_uri;
    }

    # Redirect HTTP to HTTPS (after certbot setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fyroscan.org;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/fyroscan.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fyroscan.org/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    root /root/fyrochain/explorer/frontend;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # API - proxy to Node.js backend
    location /api {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Health check
    location /health {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Static files with cache
    location ~* \.(css|js|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─── fyrochain.com - Landing Page ───────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name fyrochain.com www.fyrochain.com;
    return 301 https://fyrochain.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fyrochain.com www.fyrochain.com;

    ssl_certificate /etc/letsencrypt/live/fyrochain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fyrochain.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /root/fyrochain/website;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript;

    location ~* \.(css|js|png|jpg|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─── rpc.fyrochain.com - Geth JSON-RPC ──────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name rpc.fyrochain.com;
    return 301 https://rpc.fyrochain.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rpc.fyrochain.com;

    ssl_certificate /etc/letsencrypt/live/rpc.fyrochain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpc.fyrochain.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;

    # CORS headers for MetaMask
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    location / {
        # Rate limiting
        limit_req zone=rpc_limit burst=20 nodelay;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_pass http://localhost:8545;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;

        # Body size for RPC calls
        client_max_body_size 1m;
    }
}
